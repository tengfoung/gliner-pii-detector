version: '3.8'

services:
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./python-service:/app
      - model-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  java-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GLINER_PYTHON_SERVICE_URL=http://python-service:5001
    depends_on:
      python-service:
        condition: service_healthy

volumes:
  model-cache:
